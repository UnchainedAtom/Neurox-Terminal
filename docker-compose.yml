version: '3.8'

services:
  neurox-terminal:
    build: .
    container_name: neurox-terminal-api
    ports:
      - "8000:8000"
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "False"
      DEMO_MODE: "True"  # Set to False if connecting to real Home Assistant
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 8000
      # SET TO THESE WHEN ON RASPERRY PI WITH HOME ASSISTANT
      # HOME_ASSISTANT_URL: http://homeassistant:8123
      # HOME_ASSISTANT_TOKEN: your_token_here
      # LIGHT_ENTITY_ID: light.your_light
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - neurox-network

networks:
  neurox-network:
    driver: bridge
